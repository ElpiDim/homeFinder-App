version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: myapp-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: myapp-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/homefinder
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - mongo
    volumes:
      - ./backend:/usr/src/app
      - ./backend/uploads:/usr/src/app/uploads
    command: npx nodemon server.js   # 👈 auto-reload backend όταν αλλάζει κώδικας

  frontend:
    build:
      context: ./frontend
    container_name: myapp-frontend
    ports:
      - "3000:3000"   # 👈 dev server αντί για nginx
    depends_on:
      - backend
    environment:
      - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/usr/src/app
    stdin_open: true
    tty: true
    command: npm start   # 👈 CRA dev server με hot reload

volumes:
  mongo_data:
